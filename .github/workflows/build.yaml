name: Build NyanCat Apps

on:
  push:
    branches:
      - main  # Ersetze dies durch 'master', falls dein Branch so heißt
  workflow_dispatch: # Erlaubt es dir, den Build manuell auf GitHub zu starten

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            output_name: NyanCat.exe
          - os: macos-latest
            output_name: NyanCat.app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Erstellt die EXE. Falls icon.ico fehlt, wird dieser Schritt übersprungen oder schlägt fehl.
          pyinstaller --onefile --noconsole --icon=icon.ico --name="NyanCat" nyan_app.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --noconsole --name="NyanCat" nyan_app.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/NyanCat*
